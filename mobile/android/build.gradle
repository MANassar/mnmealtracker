allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

def newBuildDir = rootProject.layout.buildDirectory.dir("../../build").get()
rootProject.layout.buildDirectory.value(newBuildDir)

subprojects {
    def newSubprojectBuildDir = newBuildDir.dir(project.name)
    project.layout.buildDirectory.value(newSubprojectBuildDir)
}

subprojects {
    project.plugins.withId("com.android.library") {
        project.androidComponents.finalizeDsl { extension ->
            if (extension.namespace == null) {
                def fallbackNamespace = project.group?.toString()
                if (fallbackNamespace == null || fallbackNamespace == "unspecified") {
                    fallbackNamespace = "com.mnmealtracker.${project.name.replace('-', '_')}"
                }
                extension.namespace = fallbackNamespace
            }

            extension.compileSdk = 36
        }
    }
}

subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}
