name: mn_meal_tracker
description: MN Meal Tracker — calorie and nutrition tracking with AI analysis.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=2.17.1 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State management
  flutter_riverpod: ^2.1.3

  # Navigation (4.x is the last series compatible with Flutter 3.0.x)
  go_router: ^4.5.1

  # Local database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.0.11

  # HTTP
  dio: ^4.0.6

  # Image
  image_picker: ^0.8.6+4
  flutter_image_compress: ^1.1.3

  # Utilities
  intl: ^0.17.0
  uuid: ^3.0.6
  shared_preferences: ^2.0.15
  file_picker: ^5.2.2
  share_plus: ^6.3.0

  # Charts
  fl_chart: ^0.55.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.3.3

flutter:
  uses-material-design: true
