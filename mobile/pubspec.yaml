name: mn_meal_tracker
description: MN Meal Tracker — calorie and nutrition tracking with AI analysis.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State management
  flutter_riverpod: ^2.1.3

  # Navigation
  go_router: ^17.2.3

  # Local database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.0.11

  # HTTP
  dio: ^4.0.6

  # Image
  image_picker: ^1.2.2
  flutter_image_compress: ^2.4.0

  # Utilities
  intl: ^0.17.0
  uuid: ^3.0.6
  shared_preferences: ^2.0.15
  file_picker: ^11.0.2
  share_plus: ^12.0.2

  # Charts
  fl_chart: ^1.2.0

  # UI
  liquid_glass_widgets: ^0.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.3.3

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
