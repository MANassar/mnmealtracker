[build]
  publish = "."
  functions = "netlify/functions"

# MEAL_TRACKER_TOKEN is intentionally embedded in the public client bundle (analytics-config.js).
# It is not a traditional secret — it provides friction against casual API abuse, not confidentiality.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "MEAL_TRACKER_TOKEN"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://eu-assets.i.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://eu.i.posthog.com https://api.openai.com https://api.anthropic.com; frame-src https://manassar.notion.site; worker-src 'self'; frame-ancestors 'none';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=self, microphone=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
