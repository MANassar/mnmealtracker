/* ── History View ───────────────────────────────────────── */
function HistView({ meals, weights = [], targets, onDelete, onEdit, onLogAgain, onDeleteWeight, onExport, onImport, onClear }) {
  // History owns its small data menu, while actual import/export lives in App.
  const [histFilter, setHistFilter] = useState('all'); // 'all' | 'meals' | 'weight'
  const groups = groupByDate(meals);
  const [importMsg, setImportMsg] = useState('');
  const [pendingImport, setPendingImport] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);
  const [dataMenuOpen, setDataMenuOpen] = useState(false);
  const importRef = useRef();
  const finishImport = mode => {
    if (!pendingImport) return;
    const result = mode ? onImport(pendingImport.meals, mode, pendingImport.weights || []) : 'cancel';
    const m = pendingImport.meals.length, w = (pendingImport.weights || []).length;
    const weightNote = w > 0 ? ` + ${w} weight entr${w === 1 ? 'y' : 'ies'}` : '';
    setImportMsg(result === 'merge'
      ? `Integrated ${m} meal${m === 1 ? '' : 's'}${weightNote}.`
      : result === 'replace'
        ? `Imported ${m} meal${m === 1 ? '' : 's'}${weightNote}.`
        : 'Import canceled.');
    setPendingImport(null);
  };
  const importMeals = async e => {
    // Both Settings and History share the same import contract: an array or {meals}.
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const parsed = JSON.parse(await file.text());
      const importedMeals = Array.isArray(parsed) ? parsed : parsed.meals;
      if (!Array.isArray(importedMeals)) throw new Error('No meals array found');
      const importedWeights = Array.isArray(parsed.weights) ? parsed.weights : [];
      setPendingImport({ meals: importedMeals, weights: importedWeights });
    } catch (error) {
      setImportMsg(`Import failed: ${error.message}`);
    } finally {
      e.target.value = '';
    }
  };
  const chooseDataAction = () => {
    // A lightweight custom menu keeps data actions reachable without a full modal.
    setDataMenuOpen(true);
  };
  const menuButtonStyle = "width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;text-align:left";
  const exportFromMenu = () => {
    // Close the menu before triggering the browser download flow.
    setDataMenuOpen(false);
    onExport();
  };
  const importFromMenu = () => {
    // Delegate to the hidden file input so mobile browsers show their native picker.
    setDataMenuOpen(false);
    importRef.current?.click();
  };
  const clearFromMenu = () => {
    setDataMenuOpen(false);
    setConfirmClear(true);
  };
  const confirmClearMeals = () => {
    const result = onClear();
    setImportMsg(result === 'clear' ? 'Cleared all meals.' : 'Clear canceled.');
    setConfirmClear(false);
  };

  return html`
    <div style="display:flex;flex-direction:column;height:100%;min-height:0">
      <div style="padding:calc(var(--sat) + 14px) 16px 10px;flex-shrink:0">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-family:'Playfair Display',serif;font-size:24px;color:var(--text);flex:1">History</div>
          <button onClick=${chooseDataAction}
            style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:0 12px;height:38px;font-size:12px;font-weight:600;cursor:pointer">
            Meal Data
          </button>
          <input ref=${importRef} type="file" accept="application/json,.json" onChange=${importMeals} style="display:none"/>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          ${['all', 'meals', 'weight'].map(f => {
            const active = histFilter === f;
            return html`
              <button key=${f} onClick=${() => setHistFilter(f)}
                style="flex:1;height:32px;border-radius:20px;font-size:11px;font-weight:700;
                       text-transform:uppercase;letter-spacing:.08em;cursor:pointer;
                       border:1px solid ${active ? 'var(--accent)' : 'var(--border)'};
                       background:${active ? 'rgba(201,168,76,.12)' : 'none'};
                       color:${active ? 'var(--accent)' : 'var(--muted)'};transition:all .2s">
                ${f === 'all' ? 'All' : f === 'meals' ? 'Meals' : 'Weight'}
              </button>`;
          })}
        </div>
        ${dataMenuOpen ? html`
          <div style="position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.25);display:flex;align-items:flex-start;justify-content:flex-end;padding:calc(var(--sat) + 58px) 16px 0">
            <div style="width:min(220px,calc(100vw - 32px));background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;box-shadow:0 14px 34px rgba(0,0,0,.28)">
              <button onClick=${importFromMenu} style=${menuButtonStyle}>Import</button>
              <button onClick=${exportFromMenu} style="${menuButtonStyle};margin-top:8px">Export</button>
              <button onClick=${clearFromMenu} style="${menuButtonStyle};margin-top:8px;color:var(--danger)">Clear all meals</button>
              <button onClick=${() => setDataMenuOpen(false)} style="${menuButtonStyle};margin-top:8px;color:var(--muted)">Cancel</button>
            </div>
          </div>` : null}
        ${confirmClear ? html`
          <div style="position:fixed;inset:0;z-index:35;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;padding:16px">
            <div style="width:min(420px,100%);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 -14px 34px rgba(0,0,0,.32)">
              <div style="font-family:'Playfair Display',serif;font-size:19px;color:var(--text);margin-bottom:6px">Clear all meals?</div>
              <div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px">This permanently removes every meal and all recovery backups from this device.</div>
              <button onClick=${confirmClearMeals} style="${menuButtonStyle};background:var(--danger);color:#fff;border-color:var(--danger);text-align:center">Clear all meals</button>
              <button onClick=${() => setConfirmClear(false)} style="${menuButtonStyle};margin-top:8px;color:var(--muted);text-align:center">Cancel</button>
            </div>
          </div>` : null}
        ${pendingImport ? html`
          <div style="position:fixed;inset:0;z-index:35;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;padding:16px">
            <div style="width:min(420px,100%);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 -14px 34px rgba(0,0,0,.32)">
              <div style="font-family:'Playfair Display',serif;font-size:19px;color:var(--text);margin-bottom:6px">Import meal backup</div>
              <div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px">
                ${pendingImport.meals.length} meal${pendingImport.meals.length === 1 ? '' : 's'}${(pendingImport.weights||[]).length > 0 ? ` + ${pendingImport.weights.length} weight entr${pendingImport.weights.length === 1 ? 'y' : 'ies'}` : ''} found
              </div>
              <button onClick=${() => finishImport('replace')} style="${menuButtonStyle};background:var(--oai);color:#0c1a10;border-color:var(--oai);text-align:center">Replace current meals</button>
              <button onClick=${() => finishImport('integrate')} style="${menuButtonStyle};margin-top:8px;text-align:center">Integrate with current meals</button>
              <button onClick=${() => finishImport(null)} style="${menuButtonStyle};margin-top:8px;color:var(--muted);text-align:center">Cancel</button>
            </div>
          </div>` : null}
        ${importMsg ? html`
          <div style="font-size:11px;margin-top:8px;color:${importMsg.startsWith('Import failed') ? 'var(--danger)' : importMsg === 'Import canceled.' ? 'var(--muted)' : 'var(--mint)'}">
            ${importMsg}
          </div>` : null}
      </div>
      <div class="scroll" style="flex:1;padding:0 16px 16px">
        <div style="min-height:calc(100% + 1px)">
          ${groups.length === 0 && weights.length === 0 ? html`
            <div style="text-align:center;padding-top:48px;color:var(--muted);font-size:14px">Meals will appear here after you log them.</div>` : null}
          ${(() => {
            const showMeals  = histFilter === 'all' || histFilter === 'meals';
            const showWeight = histFilter === 'all' || histFilter === 'weight';

            // Collect all dates that have content matching the current filter.
            const allDates = new Set([
              ...(showMeals  ? groups.map(([d]) => d) : []),
              ...(showWeight ? weights.map(w => w.date) : []),
            ]);
            const sortedDates = [...allDates].sort((a, b) => b.localeCompare(a));

            return sortedDates.map(date => {
              const dayMeals  = showMeals  ? (groups.find(([d]) => d === date)?.[1] || []) : [];
              const dayWeight = showWeight ? weights.find(w => w.date === date) : null;
              if (dayMeals.length === 0 && !dayWeight) return null;

              const cal = sum(dayMeals, 'calories'), p = sum(dayMeals, 'protein');
              const c   = sum(dayMeals, 'carbs'),    f = sum(dayMeals, 'fat');
              const over = cal > targets.calories;
              const sortedDayMeals = [...dayMeals].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

              return html`
                <div key=${date} style="margin-bottom:24px">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px">
                    <div>
                      <div style="font-family:'Playfair Display',serif;font-size:17px;color:var(--text)">${fmtDate(date)}</div>
                      ${showMeals && dayMeals.length > 0 ? html`
                        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px">
                          ${dayMeals.length} Meal${dayMeals.length === 1 ? '' : 's'}
                        </div>` : null}
                    </div>
                    ${showMeals && dayMeals.length > 0 ? html`
                      <div style="text-align:right">
                        <div style="font-size:16px;color:${over ? 'var(--danger)' : 'var(--mint)'};font-family:'DM Mono',monospace;font-weight:700">${Math.round(cal)} kcal</div>
                        <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px">${p.toFixed(0)}P · ${c.toFixed(0)}C · ${f.toFixed(0)}F</div>
                      </div>` : null}
                  </div>
                  ${showMeals && dayMeals.length > 0 ? html`
                    <div style="height:2px;background:var(--card);border-radius:1px;margin-bottom:8px">
                      <div style="height:100%;width:${Math.min((cal / targets.calories) * 100, 100)}%;background:${over ? 'var(--danger)' : 'var(--accent)'};border-radius:1px"/>
                    </div>` : null}
                  ${dayWeight ? html`<${WeightEntryCard} key=${`w-${dayWeight.id}`} entry=${dayWeight} onDelete=${onDeleteWeight}/>` : null}
                  ${sortedDayMeals.map(m => html`<${MealCard} key=${m.id} meal=${m} onDelete=${onDelete} onEdit=${onEdit} onLogAgain=${onLogAgain}/>`)}
                </div>
              `;
            });
          })()}
        </div>
      </div>
    </div>`;
}

/* ── Settings View ──────────────────────────────────────── */
function SettView({ settings, meals, onSave, onBack, onExport, onImport, onFeedback }) {
  // Settings edits are staged locally until Save so Back can discard theme changes.
  const [provider,     setProvider]     = useState(settings.provider     || 'server');
  const [anthropicKey, setAnthropicKey] = useState(settings.anthropicKey || '');
  const [oaiKey,       setOaiKey]       = useState(settings.oaiKey       || '');
  const [theme,        setTheme]        = useState(settings.theme        || 'auto');
  const savedTargets = normalizeTargets(settings);
  const [targetCal,     setTargetCal]     = useState(String(Math.round(savedTargets.calories)));
  const [targetProtein, setTargetProtein] = useState(String(Math.round(savedTargets.protein)));
  const [targetCarbs,   setTargetCarbs]   = useState(String(Math.round(savedTargets.carbs)));
  const [targetFat,     setTargetFat]     = useState(String(Math.round(savedTargets.fat)));
  const [weightUnit,   setWeightUnit]   = useState(settings.weightUnit || 'kg');
  const [goalWeight,   setGoalWeight]   = useState(settings.goalWeight != null ? String(settings.goalWeight) : '');
  const [saved,        setSaved]        = useState(false);
  const [importMsg,    setImportMsg]    = useState('');
  const [pendingImport, setPendingImport] = useState(null);
  const importRef = useRef();

  useEffect(() => {
    // If a manual key is removed while selected, fall back to the server provider.
    if ((provider === 'anthropic' && !anthropicKey.trim()) || (provider === 'openai' && !oaiKey.trim())) {
      setProvider('server');
    }
  }, [provider, anthropicKey, oaiKey]);

  const save = () => {
    // Normalize numeric targets on save rather than on every keystroke.
    const goalNum = goalWeight.trim() ? asPositiveNumber(goalWeight, 0) || null : null;
    onSave({
      provider, anthropicKey, oaiKey, theme, weightUnit,
      goalWeight: goalNum,
      targets: {
        calories: asPositiveNumber(targetCal, DEFAULT_TARGETS.calories),
        protein:  asPositiveNumber(targetProtein, DEFAULT_TARGETS.protein),
        carbs:    asPositiveNumber(targetCarbs, DEFAULT_TARGETS.carbs),
        fat:      asPositiveNumber(targetFat, DEFAULT_TARGETS.fat),
      },
    });
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  };

  const ProvTab = ({ id, label, sub, disabled = false }) => {
    // Provider tabs are disabled until their required manual key exists.
    const active = provider === id;
    const col    = providerColor(id);
    const bg     = id === 'anthropic' ? 'rgba(201,168,76,.1)' : 'rgba(116,170,156,.1)';
    return html`
      <button disabled=${disabled} onClick=${() => !disabled && setProvider(id)}
        style="flex:1;padding:12px 8px;border-radius:10px;border:1px solid ${active ? col : 'var(--border)'};background:${active ? bg : 'none'};cursor:${disabled ? 'not-allowed' : 'pointer'};text-align:center;transition:all .2s;opacity:${disabled ? .45 : 1}">
        <div style="font-size:13px;font-weight:600;color:${active ? col : 'var(--muted)'}">${label}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${sub}</div>
      </button>`;
  };

  const UnitTab = ({ id, label }) => {
    const active = weightUnit === id;
    return html`
      <button onClick=${() => setWeightUnit(id)}
        style="flex:1;padding:12px 8px;border-radius:10px;border:1px solid ${active ? 'var(--mint)' : 'var(--border)'};
               background:${active ? 'rgba(109,184,122,.1)' : 'none'};cursor:pointer;text-align:center;
               transition:all .2s;color:${active ? 'var(--mint)' : 'var(--muted)'};font-size:13px;font-weight:600">
        ${label}
      </button>`;
  };

  const ThemeTab = ({ id, label }) => {
    // Theme changes preview immediately; Back restores the previously saved theme.
    const active = theme === id;
    return html`
      <button onClick=${() => { setTheme(id); applyTheme(id); }}
        style="flex:1;padding:12px 8px;border-radius:10px;border:1px solid ${active ? activeColor : 'var(--border)'};background:${active ? 'rgba(201,168,76,.1)' : 'none'};cursor:pointer;text-align:center;transition:all .2s;color:${active ? activeColor : 'var(--muted)'};font-size:13px;font-weight:600">
        ${label}
      </button>`;
  };

  const back = () => {
    // Undo any unsaved theme preview before leaving Settings.
    applyTheme(settings.theme);
    onBack();
  };

  const activeColor = providerColor(provider);

  // Shared target editor used for calories and macro goals.
  const TargetInput = ({ label, value, onInput, color, unit }) => html`
    <label style="display:block">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">${label}</div>
      <div style="display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0 12px">
        <input type="number" min="1" value=${value} onInput=${e => onInput(e.target.value)}
          style="width:100%;background:transparent;border:none;color:${color};font-size:18px;font-family:'DM Mono',monospace;font-weight:700;outline:none;padding:12px 0"/>
        <span style="font-size:11px;color:var(--muted)">${unit}</span>
      </div>
    </label>`;

  const finishImport = mode => {
    if (!pendingImport) return;
    const result = mode ? onImport(pendingImport.meals, mode, pendingImport.weights || []) : 'cancel';
    const m = pendingImport.meals.length, w = (pendingImport.weights || []).length;
    const weightNote = w > 0 ? ` + ${w} weight entr${w === 1 ? 'y' : 'ies'}` : '';
    setImportMsg(result === 'merge'
      ? `Integrated ${m} meal${m === 1 ? '' : 's'}${weightNote}.`
      : result === 'replace'
        ? `Imported ${m} meal${m === 1 ? '' : 's'}${weightNote}.`
        : 'Import canceled.');
    setPendingImport(null);
  };

  const importMeals = async e => {
    // Settings duplicates History import affordance for users who manage data here.
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const parsed = JSON.parse(await file.text());
      const importedMeals = Array.isArray(parsed) ? parsed : parsed.meals;
      if (!Array.isArray(importedMeals)) throw new Error('No meals array found');
      const importedWeights = Array.isArray(parsed.weights) ? parsed.weights : [];
      setPendingImport({ meals: importedMeals, weights: importedWeights });
    } catch (error) {
      setImportMsg(`Import failed: ${error.message}`);
    } finally {
      e.target.value = '';
    }
  };

  return html`
    <div style="display:flex;flex-direction:column;height:100%">
      ${pendingImport ? html`
        <div style="position:fixed;inset:0;z-index:35;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;padding:16px">
          <div style="width:min(420px,100%);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 -14px 34px rgba(0,0,0,.32)">
            <div style="font-family:'Playfair Display',serif;font-size:19px;color:var(--text);margin-bottom:6px">Import meal backup</div>
            <div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px">
              ${pendingImport.meals.length} meal${pendingImport.meals.length === 1 ? '' : 's'}${(pendingImport.weights||[]).length > 0 ? ` + ${pendingImport.weights.length} weight entr${pendingImport.weights.length === 1 ? 'y' : 'ies'}` : ''} found
            </div>
            <button onClick=${() => finishImport('replace')}
              style="width:100%;background:var(--oai);border:1px solid var(--oai);color:#0c1a10;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;text-align:center">
              Replace current meals
            </button>
            <button onClick=${() => finishImport('integrate')}
              style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;margin-top:8px">
              Integrate with current meals
            </button>
            <button onClick=${() => finishImport(null)}
              style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;margin-top:8px">
              Cancel
            </button>
          </div>
        </div>` : null}
      <div style="padding:calc(var(--sat) + 14px) 16px 12px;flex-shrink:0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:12px">
          <button onClick=${back}
            style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center">←</button>
          <span style="font-family:'Playfair Display',serif;font-size:22px;color:var(--text)">Settings</span>
        </div>
      </div>

      <div class="scroll" style="flex:1;padding:20px 16px calc(var(--sab) + 20px)">

        <!-- Provider selector -->
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">AI Provider</div>
        <div style="display:flex;gap:10px;margin-bottom:22px">
          <${ProvTab} id="server"    label="Server"    sub="Netlify key"/>
          <${ProvTab} id="anthropic" label="Anthropic" sub="Manual key" disabled=${!anthropicKey.trim()}/>
          <${ProvTab} id="openai"    label="OpenAI"    sub="Manual key" disabled=${!oaiKey.trim()}/>
        </div>

        <!-- Appearance selector -->
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Appearance</div>
        <div style="display:flex;gap:10px;margin-bottom:22px">
          <${ThemeTab} id="auto"  label="Auto"/>
          <${ThemeTab} id="light" label="Light"/>
          <${ThemeTab} id="dark"  label="Dark"/>
        </div>

        <!-- Targets -->
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Daily Targets</div>
        <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:22px">
          <${TargetInput} label="Calories" value=${targetCal} onInput=${setTargetCal} color="var(--accent)" unit="kcal"/>
          <${TargetInput} label="Protein"  value=${targetProtein} onInput=${setTargetProtein} color="var(--mint)" unit="g"/>
          <${TargetInput} label="Carbs"    value=${targetCarbs} onInput=${setTargetCarbs} color="var(--sky)" unit="g"/>
          <${TargetInput} label="Fat"      value=${targetFat} onInput=${setTargetFat} color="var(--peach)" unit="g"/>
        </div>

        <!-- Weight unit -->
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Weight Unit</div>
        <div style="display:flex;gap:10px;margin-bottom:16px">
          <${UnitTab} id="kg"  label="kg"/>
          <${UnitTab} id="lbs" label="lbs"/>
        </div>

        <!-- Goal weight -->
        <div style="margin-bottom:22px">
          <${TargetInput} label="Goal Weight" value=${goalWeight} onInput=${setGoalWeight} color="var(--mint)" unit=${weightUnit}/>
          <div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5">Optional. Shown as a reference line on the weight chart.</div>
        </div>

        <!-- Anthropic key -->
        <div style="margin-bottom:20px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Anthropic API Key</span>
            ${provider === 'anthropic' ? html`<span style="font-size:10px;color:var(--accent);font-weight:600">● Active</span>` : null}
          </div>
          <input class="ph-no-capture" type="password" value=${anthropicKey} onInput=${e => setAnthropicKey(e.target.value)}
            placeholder="sk-ant-api03-…"
            style="width:100%;background:var(--card);border:1px solid ${provider === 'anthropic' ? 'rgba(201,168,76,.4)' : 'var(--border)'};border-radius:10px;color:var(--text);font-size:16px;padding:14px;outline:none;font-family:'DM Mono',monospace;box-sizing:border-box;margin-bottom:6px"/>
          <div style="font-size:11px;color:var(--muted);line-height:1.5">
            Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
          </div>
        </div>

        <!-- OpenAI key -->
        <div style="margin-bottom:24px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">OpenAI API Key</span>
            ${provider === 'openai' ? html`<span style="font-size:10px;color:var(--oai);font-weight:600">● Active</span>` : null}
          </div>
          <input class="ph-no-capture" type="password" value=${oaiKey} onInput=${e => setOaiKey(e.target.value)}
            placeholder="sk-proj-…"
            style="width:100%;background:var(--card);border:1px solid ${provider === 'openai' ? 'rgba(116,170,156,.4)' : 'var(--border)'};border-radius:10px;color:var(--text);font-size:16px;padding:14px;outline:none;font-family:'DM Mono',monospace;box-sizing:border-box;margin-bottom:6px"/>
          <div style="font-size:11px;color:var(--muted);line-height:1.5">
            Optional. Leave empty to use the Server provider.
          </div>
        </div>

        <!-- Key storage notice -->
        ${(anthropicKey.trim() || oaiKey.trim()) ? html`
        <div style="font-size:11px;color:var(--muted);line-height:1.6;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:20px">
          API keys are stored in your browser's local storage on this device only and are never sent to any server other than the respective AI provider.
        </div>` : null}

        <!-- Save -->
        <button onClick=${save}
          style="width:100%;padding:16px;background:${activeColor};border:none;border-radius:14px;font-size:15px;font-weight:700;color:#0c1a10;cursor:pointer;min-height:54px;margin-bottom:24px">
          ${saved ? 'Saved ✓' : 'Save Settings'}
        </button>

        <div style="font-size:12px;color:var(--muted);line-height:1.9;padding:14px;background:var(--card);border-radius:12px;margin-bottom:16px">
          <div style="color:var(--text);font-weight:600;margin-bottom:8px">Meal Data</div>
          <div style="display:flex;gap:10px;margin-bottom:8px">
            <button onClick=${onExport}
              style="flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer">
              Export
            </button>
            <button onClick=${() => importRef.current?.click()}
              style="flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer">
              Import
            </button>
          </div>
          <input ref=${importRef} type="file" accept="application/json,.json" onChange=${importMeals} style="display:none"/>
          <div>${meals.length} meal${meals.length === 1 ? '' : 's'} stored</div>
          ${importMsg ? html`<div style="color:${importMsg.startsWith('Import failed') ? 'var(--danger)' : importMsg === 'Import canceled.' ? 'var(--muted)' : 'var(--mint)'}">${importMsg}</div>` : null}
        </div>

        <div style="font-size:12px;color:var(--muted);line-height:1.9;padding:14px;background:var(--card);border-radius:12px;margin-bottom:16px">
          <div style="color:var(--text);font-weight:600;margin-bottom:8px">Feedback</div>
          <button onClick=${() => onFeedback('settings')}
            style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer">
            Send Feedback
          </button>
        </div>

        <div style="font-size:12px;color:var(--muted);padding:14px;background:var(--card);border-radius:12px;line-height:1.7">
          <div style="color:var(--text);font-weight:600;margin-bottom:6px">📱 Install as app</div>
          <div><strong style="color:var(--text)">iOS Safari:</strong> Share → Add to Home Screen</div>
          <div><strong style="color:var(--text)">Android Chrome:</strong> ⋮ → Add to Home Screen</div>
          <div style="margin-top:8px;color:var(--muted);font-family:'DM Mono',monospace">Version ${APP_VERSION}</div>
        </div>
      </div>
    </div>`;
}

function FeedbackModal({ source, onClose }) {
  const analyticsProps = { source, installed: isStandaloneApp() };
  return html`
    <div role="dialog" aria-modal="true" aria-label="Feedback form"
      style="position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.58);display:flex;align-items:stretch;justify-content:center;padding:calc(var(--sat) + 12px) 12px calc(var(--sab) + 12px)">
      <div style="width:min(720px,100%);height:100%;background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.45)">
        <div style="height:56px;display:flex;align-items:center;gap:10px;padding:8px 10px 8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)">
          <div style="flex:1;min-width:0;color:var(--text);font-weight:700;font-size:14px">Send Feedback</div>
          <a href=${FEEDBACK_FORM_URL} target="_blank" rel="noopener noreferrer" onClick=${() => trackEvent('feedback_external_opened', analyticsProps)}
            style="color:var(--muted);font-size:12px;font-weight:600;padding:10px 8px;white-space:nowrap">
            Open in browser

          <button aria-label="Close feedback form" onClick=${() => {
              trackEvent('feedback_modal_closed', analyticsProps);

            style="background:var(--surface);border:1px solid var(--border);border-radius:999px;color:var(--text);font-size:20px;line-height:1;min-width:38px;min-height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center">
            ×
          </button>
        </div>
        <iframe src=${FEEDBACK_EMBED_URL} title="Meal Tracker feedback form" frameborder="0" allowfullscreen
          onLoad=${() => trackEvent('feedback_embed_loaded', analyticsProps)}
          onError=${() => trackEvent('feedback_embed_failed', analyticsProps)}
          style="width:100%;height:100%;border:0;background:var(--surface);flex:1;min-height:0">
        </iframe>
      </div>
    </div>`;
}

/* ── Root App ───────────────────────────────────────────── */
function App() {
  // App is the state owner: child views receive callbacks instead of touching storage.
  const stored  = loadSettings();
  const [meals,   setMeals]    = useState(() => loadMeals());
  const [settings,setSettings] = useState(() => {
    const merged = { provider:'server', anthropicKey:'', oaiKey:'', theme:'auto', weightUnit:'kg', goalWeight:null, ...stored };
    return { ...merged, provider: normalizeProviderSetting(merged) };
  });
  const [view,    setView]     = useState('today');
  const [editingMeal, setEditingMeal] = useState(null);
  const [repeatMeal, setRepeatMeal] = useState(null);
  const [editReturnView, setEditReturnView] = useState('today');
  const [storageErr, setStorageErr] = useState('');
  const [feedbackOpen, setFeedbackOpen] = useState(false);
  const [feedbackSource, setFeedbackSource] = useState('unknown');
  const [weights, setWeights] = useState(() => loadWeights());

  useEffect(() => {
    // Keep app chrome and browser theme color in sync with saved settings.
    applyTheme(settings.theme);
    const mq = window.matchMedia?.('(prefers-color-scheme: light)');
    const onChange = () => applyTheme(settings.theme);
    mq?.addEventListener?.('change', onChange);
    mq?.addListener?.(onChange);
    return () => {
      mq?.removeEventListener?.('change', onChange);
      mq?.removeListener?.(onChange);
    };
  }, [settings.theme]);

  useEffect(() => {
    // Track view changes manually because this single-page app has no route changes.
    trackEvent('app_viewed', { view, editing: Boolean(editingMeal) });
    trackPageview('app_viewed', { view, editing: Boolean(editingMeal) });
  }, [view, editingMeal]);

  useEffect(() => {
    // Storage toasts are important but should not stay pinned over the UI forever.
    if (!storageErr) return undefined;
    const t = setTimeout(() => setStorageErr(''), 8000);
    return () => clearTimeout(t);
  }, [storageErr]);

  const persistMeals = (nextMeals, options = {}) => {
    // Do not update UI state unless persistence succeeds; otherwise a reload
    // would make the just-entered meal seem to disappear.
    const result = saveMeals(nextMeals, options);
    if (!result.ok) {
      setStorageErr('Meal was not saved. Storage is full; export a backup or delete older meals/photos.');
      return false;
    }
    setStorageErr(result.slimmed
      ? `Saved, but removed ${result.removedPhotos || 'some'} older meal photo${result.removedPhotos === 1 ? '' : 's'} because browser storage was full.`
      : '');
    setMeals(result.meals);
    return true;
  };

  const addMeal = (meal, meta = {}) => {
    // New meals are prepended so the latest log appears first everywhere.
    const u = [meal, ...meals];
    if (persistMeals(u)) {
      trackEvent('meal_logged', mealAnalyticsProps(meal, meta));
      setRepeatMeal(null);
      setView('today');
    }
  };
  const updateMeal = (meal, meta = {}) => {
    // Editing preserves the meal id and returns to the view that launched editing.
    const u = meals.map(m => m.id === meal.id ? meal : m);
    if (persistMeals(u)) {
      trackEvent('meal_updated', mealAnalyticsProps(meal, meta));
      setEditingMeal(null);
      setView(editReturnView);
    }
  };
  const saveMeal = (meal, meta) => editingMeal ? updateMeal(meal, meta) : addMeal(meal, meta);
  const editMeal = meal => {
    trackEvent('meal_edit_started', { from_view: view });
    setRepeatMeal(null);
    setEditingMeal(meal);
    setEditReturnView(view);
    setView('add');
  };
  const logMealAgain = meal => {
    trackEvent('meal_log_again_started', {
      source: 'history',
      provider: meal?.provider || 'unknown',
      calories_bucket: valueBucket(meal?.calories, 100),
    });
    setEditingMeal(null);
    setRepeatMeal(meal);
    setEditReturnView('history');
    setView('add');
  };
  const deleteMeal = id => {
    // Deletion is immediate after the card-level confirmation.
    const deletedMeal = meals.find(m => m.id === id) || { id };
    const u = meals.filter(m => m.id !== id);
    if (persistMeals(u)) {
      rememberDeletedMeal(deletedMeal);
      trackEvent('meal_deleted', { from_view: view });
    }
  };
  const clearMeals = () => {
    // Clear means purge all meal stores, including recovery backups and tombstones.
    purgeMealStorage();
    setStorageErr('');
    setMeals([]);
    trackEvent('meals_cleared');
    return 'clear';
  };
  const updateSettings = s => {
    // Provider settings are sanitized so stale manual selections cannot break Analyze.
    const normalized = { ...s, provider: normalizeProviderSetting(s) };
    if (s.weightUnit !== settings.weightUnit) {
      trackEvent('weight_unit_changed', { unit: s.weightUnit });
    }
    setSettings(normalized);
    saveSettings(normalized);
    trackEvent('settings_saved', {
      provider: normalized.provider,
      theme: normalized.theme || 'auto',
      has_anthropic_key: Boolean(normalized.anthropicKey?.trim()),
      has_openai_key: Boolean(normalized.oaiKey?.trim()),
      weight_unit: normalized.weightUnit || 'kg',
    });
  };
  const targets = normalizeTargets(settings);
  const exportMeals = () => {
    // Export intentionally includes only meal/weight data, not API keys or settings.
    const data = {
      app: 'mnmealtracker',
      version: APP_VERSION,
      exportedAt: new Date().toISOString(),
      meals,
      weights,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `meal-tracker-export-${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    trackEvent('meals_exported', { meal_count_bucket: valueBucket(meals.length, 10), weight_count_bucket: valueBucket(weights.length, 10) });
  };
  const importMeals = (importedMeals, mode, importedWeights = []) => {
    // Import supports replace or integrate; integrate de-dupes by stable meal id.
    const importedCount = importedMeals.length;
    if (mode === 'replace') {
      const ok = persistMeals(importedMeals, { resetSnapshots: true });
      if (ok) {
        if (importedWeights.length > 0) { saveWeights(importedWeights); setWeights(importedWeights); }
        trackEvent('meals_imported', { mode, imported_count_bucket: valueBucket(importedCount, 10) });
      }
      return ok ? 'replace' : 'cancel';
    }
    if (mode !== 'integrate') return 'cancel';
    const byId = new Map(meals.map(meal => [String(meal.id), meal]));
    const signatureToId = new Map(meals.map(meal => [mealSignature(meal), String(meal.id)]));
    importedMeals.forEach(meal => {
      const id = meal.id ?? `${meal.date || ''}-${meal.timestamp || ''}-${meal.mealName || Math.random()}`;
      const existingId = signatureToId.get(mealSignature(meal));
      if (existingId) byId.set(existingId, { ...meal, id: existingId });
      else byId.set(String(id), { ...meal, id });
    });
    const merged = [...byId.values()].sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
    const ok = persistMeals(merged);
    if (ok) {
      if (importedWeights.length > 0) {
        const mergedW = [...new Map([...importedWeights, ...weights].map(w => [w.id, w])).values()]
          .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        saveWeights(mergedW); setWeights(mergedW);
      }
      trackEvent('meals_imported', { mode, imported_count_bucket: valueBucket(importedCount, 10) });
    }
    return ok ? 'merge' : 'cancel';
  };
  const openFeedback = source => {
    trackEvent('feedback_opened', { source, installed: isStandaloneApp() });
    setFeedbackSource(source);
    setFeedbackOpen(true);
  };
  const addWeight = entry => {
    const next = [entry, ...weights];
    saveWeights(next); setWeights(next);
    trackEvent('weight_logged', { unit: entry.unit, weight_bucket: valueBucket(entry.weight, 5) });
  };
  const deleteWeight = id => {
    const next = weights.filter(w => w.id !== id);
    saveWeights(next); setWeights(next);
    trackEvent('weight_deleted', { from_view: view });
  };
  const setGoalWeight = g => {
    const next = { ...settings, goalWeight: g };
    setSettings(next); saveSettings(next);
    if (g != null) trackEvent('weight_goal_set', { unit: settings.weightUnit || 'kg', goal_bucket: valueBucket(g, 5) });
  };

  const NAV = [
    { key: 'today',   icon: '◉', label: 'Home'    },
    { key: 'add',     icon: '+', label: 'Add'      },
    { key: 'history', icon: '≡', label: 'History'  },
    { key: 'weight',  icon: '⚖', label: 'Weight'  },
  ];

  const navAccent = providerColor(settings.provider);

  return html`
    <div style="display:flex;flex-direction:column;height:100%;background:var(--bg);padding-bottom:${view !== 'add' && view !== 'settings' ? 'calc(var(--tab-h) + var(--sab))' : '0'}">
      ${feedbackOpen ? html`<${FeedbackModal} source=${feedbackSource} onClose=${() => setFeedbackOpen(false)}/>` : null}
      ${storageErr ? html`
        <div style="position:fixed;left:12px;right:12px;top:calc(var(--sat) + 10px);z-index:50;background:var(--danger);color:#fff;border-radius:12px;padding:12px 12px 12px 14px;font-size:13px;line-height:1.4;box-shadow:0 14px 34px rgba(0,0,0,.3);display:flex;gap:10px;align-items:flex-start">
          <div style="flex:1;min-width:0">${storageErr}</div>
          <button onClick=${() => setStorageErr('')}
            style="background:none;border:none;color:#fff;font-size:18px;line-height:1;cursor:pointer;min-width:28px;min-height:28px;display:flex;align-items:center;justify-content:center;margin-top:-4px">×</button>
        </div>` : null}
      <div style="flex:1;overflow:hidden;min-height:0;padding-bottom:${view !== 'add' && view !== 'settings' ? '0' : '0'}">
        ${view === 'add'      ? html`<${AddView} key=${editingMeal ? `edit-${editingMeal.id}` : repeatMeal ? `repeat-${repeatMeal.id}` : 'new'} settings=${settings} meals=${meals} meal=${editingMeal} repeatMeal=${repeatMeal} onSave=${saveMeal}  onCancel=${() => { setEditingMeal(null); setRepeatMeal(null); setView(editingMeal || repeatMeal ? editReturnView : 'today'); }}/>` :
          view === 'settings' ? html`<${SettView} settings=${settings} meals=${meals} onSave=${s => { updateSettings(s); setView('today'); }} onBack=${() => setView('today')} onExport=${exportMeals} onImport=${importMeals} onFeedback=${openFeedback}/>` :
          view === 'history'  ? html`<${HistView} meals=${meals} weights=${weights} targets=${targets} onDelete=${deleteMeal} onEdit=${editMeal} onLogAgain=${logMealAgain} onDeleteWeight=${deleteWeight} onExport=${exportMeals} onImport=${importMeals} onClear=${clearMeals}/>` :
          view === 'weight'   ? html`<${WeightView} weights=${weights} settings=${settings} onAddWeight=${addWeight} onDeleteWeight=${deleteWeight} onSetGoal=${setGoalWeight} onSettings=${() => setView('settings')}/>` :
                                html`<${TodayView} meals=${meals} targets=${targets} onDelete=${deleteMeal} onEdit=${editMeal} onSettings=${() => setView('settings')} onFeedback=${openFeedback}/>`}
      </div>

      ${view !== 'add' && view !== 'settings' ? html`
        <div class="tabbar">
          ${NAV.map(item => {
            const isAdd  = item.key === 'add';
            const active = view === item.key;
            return html`
              <button key=${item.key} onClick=${() => { setEditingMeal(null); setRepeatMeal(null); setView(item.key); }}
                style="flex:1;height:var(--tab-h);padding:${isAdd ? '8px 0 14px' : '12px 0 14px'};
                       background:${isAdd ? navAccent : active ? 'rgba(201,168,76,.12)' : 'none'};
                       border:none;cursor:pointer;
                       display:flex;flex-direction:column;align-items:center;gap:4px;
                       color:${isAdd ? '#0c1a10' : active ? navAccent : 'var(--muted)'};
                       transition:color .2s, background .2s;min-height:var(--tab-h);position:relative;z-index:1">
                <span style="font-size:${isAdd ? '25px' : '17px'};line-height:1">${item.icon}</span>
                <span style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:${active || isAdd ? 700 : 500}">${item.label}</span>
                ${active && !isAdd ? html`<span style="width:18px;height:2px;background:${navAccent};border-radius:2px;margin-top:1px"></span>` : null}
              </button>`;
          })}
        </div>` : null}
    </div>`;
}

try {
  render(html`<${App}/>`, document.getElementById('root'));
} catch (error) {
  showBootError(error);
}
</script>
</body>
</html>
