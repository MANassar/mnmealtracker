<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=auto, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meal Tracker">
  <meta name="theme-color" content="#0c1a10">
  <link rel="manifest" href="./app.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
  <style>

    }
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg:      #f7f4ec;
        --surface: #fffaf0;
        --card:    #ffffff;
        --border:  rgba(24,40,28,0.12);
        --accent:  #9f7b19;
        --mint:    #2f8a48;
        --sky:     #3c76ad;
        --peach:   #b85f3c;
        --plum:    #8153a6;
        --text:    #152018;
        --muted:   #667268;
        --danger:  #b94f40;
        --oai:     #3c8277;
        --nav-bg:  rgba(247,244,236,.97);

      }
    }
    *, *::before, *::after {

    input, textarea, button { font-family: inherit; }
    input, textarea { font-size: 16px !important; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

<body>
<div id="root">
  <div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px">
    Loading Meal Tracker...
  </div>
</div>
<script src="./preact.umd.js"></script>
<script src="./preact-hooks.umd.js"></script>
<script src="./htm.umd.js"></script>
<script src="./version.js"></script>
<script src="./analytics-config.js"></script>
<script>
function showBootError(error) {
  const root = document.getElementById('root');
  const message = error?.message || String(error || 'Unknown startup error');

  const outer = document.createElement('div');
  outer.setAttribute('style', 'min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);color:var(--text)');
  const card = document.createElement('div');
  card.setAttribute('style', 'max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;line-height:1.5');
  const title = document.createElement('div');
  title.setAttribute('style', "font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px");
  title.textContent = 'Meal Tracker could not load';
  const hint = document.createElement('div');
  hint.setAttribute('style', 'font-size:13px;color:var(--muted);margin-bottom:12px');
  hint.textContent = 'Close the app and open it again from Safari once. If this keeps happening, remove the home-screen icon and add it again.';
  const errMsg = document.createElement('div');
  errMsg.setAttribute('style', "font-family:'DM Mono',monospace;font-size:11px;color:var(--danger);word-break:break-word");
  errMsg.textContent = message;

  card.appendChild(title);
  card.appendChild(hint);
  card.appendChild(errMsg);
  outer.appendChild(card);
  root.textContent = '';
  root.appendChild(outer);
}

window.addEventListener('error', event => showBootError(event.error || event.message));
window.addEventListener('unhandledrejection', event => showBootError(event.reason));

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

const { h, render } = window.preact;
const { useState, useRef, useEffect } = window.preactHooks;
const html = window.htm.bind(h);

/* ── Constants ─────────────────────────────────────────── */
const MEALS_KEY   = 'mt_meals_v1';
const MEALS_BACKUP_KEY = 'mt_meals_backup_v1';
const MEALS_SNAP_KEY   = 'mt_meals_snapshots_v1';
const DELETED_MEALS_KEY = 'mt_deleted_meals_v1';
const SETT_KEY    = 'mt_settings_v1';
const APP_VERSION = window.APP_VERSION || '0.1.1';
const DEFAULT_TARGETS = { calories: 1800, protein: 150, carbs: 180, fat: 60 };
const FEEDBACK_FORM_URL = 'https://bit.ly/4dAU3UV';
const FEEDBACK_EMBED_URL = 'https://manassar.notion.site/ebd//394fd2798c9a4a0cbb9aeba585fb2938';

/* ── Analytics ─────────────────────────────────────────── */
const analyticsConfig = window.POSTHOG_CONFIG || {};
const safeAnalyticsProps = props => Object.fromEntries(
  Object.entries(props || {}).filter(([, value]) =>
    value === null || ['string', 'number', 'boolean'].includes(typeof value)
  )
);
const initAnalytics = () => {
  // PostHog is opt-in by configuration; no script loads until a key is present.
  const apiKey = String(analyticsConfig.apiKey || '').trim();
  if (!apiKey || window.posthog) return;
  const apiHost = String(analyticsConfig.apiHost || 'https://us.i.posthog.com').replace(/\/$/, '');
  const assetHost = String(analyticsConfig.assetHost || apiHost.replace('.i.posthog.com', '-assets.i.posthog.com')).replace(/\/$/, '');
  const script = document.createElement('script');
  script.async = true;
  script.src = `${assetHost}/static/array.js`;
  script.onload = () => {
    window.posthog?.init?.(apiKey, {
      api_host: apiHost,
      defaults: analyticsConfig.defaults || '2026-01-30',
      autocapture: false,
      capture_pageview: false,
      disable_session_recording: analyticsConfig.sessionReplay === false,
      mask_all_text: true,
      mask_all_element_attributes: true,
      person_profiles: 'always',
    });
    // Identify with a stable anonymous ID so PostHog counts this device as a person.
    try {
      let anonId = localStorage.getItem('mt_anon_id');
      if (!anonId) {
        anonId = 'anon-' + crypto.randomUUID();
        localStorage.setItem('mt_anon_id', anonId);
      }
      window.posthog?.identify?.(anonId);
    } catch {}
    trackEvent('app_loaded', { version: APP_VERSION, installed: isStandaloneApp() });
    trackPageview('app_loaded', { view: 'today' });
  };
  script.onerror = () => {};
  document.head.appendChild(script);
};
const trackEvent = (name, props = {}) => {
  // Analytics events must never include meal descriptions, ingredients, photos, or keys.
  try { window.posthog?.capture?.(name, safeAnalyticsProps({ version: APP_VERSION, ...props })); } catch {}
};
const trackPageview = (source, props = {}) => {
  trackEvent('$pageview', {
    source,
    path: location.pathname || '/',
    installed: isStandaloneApp(),
    ...props,
  });
};
const isStandaloneApp = () =>
  window.matchMedia?.('(display-mode: standalone)').matches || window.navigator.standalone === true;
const valueBucket = (value, size) => {
  const n = Number(value);
  if (!Number.isFinite(n) || n < 0) return 'unknown';
  const low = Math.floor(n / size) * size;
  return `${low}-${low + size - 1}`;
};
const mealAnalyticsProps = (meal, meta = {}) => ({
  provider: meal?.provider || 'unknown',
  used_image: Boolean(meal?.imageData),
  used_description: Boolean(meal?.description),
  log_date: meal?.date === todayStr() ? 'today' : 'other_day',
  calories_bucket: valueBucket(meal?.calories, 100),
  source: meta.source || 'analysis',
  optimized: Boolean(meta.optimized),
  nutrition_edited: Boolean(meta.nutritionEdited),
  nutrition_field_count: Number(meta.nutritionFieldCount || 0),
  nutrition_fields: meta.nutritionFields || '',
});
initAnalytics();

/* ── Storage ────────────────────────────────────────────── */
// Meals and settings are local-first. Nothing here leaves the device unless
// the user calls an AI provider or exports/imports a backup file.
const parseStoredJson = (key, fallback) => {
  try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
  catch { return fallback; }
};
const mealKey = meal => String(meal?.id ?? `${meal?.date || ''}-${meal?.timestamp || ''}-${meal?.mealName || ''}`);
const mealListFrom = value => Array.isArray(value) ? value : Array.isArray(value?.meals) ? value.meals : [];
const deletedMealKeys = () => new Set(parseStoredJson(DELETED_MEALS_KEY, []));
const rememberDeletedMeal = meal => {
  // Tombstones prevent recovery snapshots from bringing back intentional deletes.
  const deleted = deletedMealKeys();
  deleted.add(mealKey(meal));
  try { localStorage.setItem(DELETED_MEALS_KEY, JSON.stringify([...deleted].slice(-500))); } catch {}
};
const clearDeletedMeals = () => {
  try { localStorage.setItem(DELETED_MEALS_KEY, '[]'); } catch {}
};
const resetMealRecovery = () => {
  // Replace imports should start a new truth set; old snapshots can otherwise
  // reintroduce stale duplicates with outdated dates.
  try {
    localStorage.removeItem(MEALS_BACKUP_KEY);
    localStorage.removeItem(MEALS_SNAP_KEY);
    localStorage.setItem(DELETED_MEALS_KEY, '[]');
  } catch {}
};
const purgeMealStorage = () => {
  // Full purge used by the explicit Clear all meals flow.
  try {
    localStorage.removeItem(MEALS_KEY);
    localStorage.removeItem(MEALS_BACKUP_KEY);
    localStorage.removeItem(MEALS_SNAP_KEY);
    localStorage.removeItem(DELETED_MEALS_KEY);
  } catch {}
};
const slimMeal = meal => {
  // Backup copies intentionally drop image data so they stay tiny and reliable.
  const { imageData, imageType, ...rest } = meal || {};
  return { ...rest, imageData: null, imageType: null };
};
const stripOldestMealPhotosUntilSaved = meals => {
  // If image-heavy primary storage is full, remove older photos one at a time
  // so recent meal photos survive whenever the browser quota allows it.
  const trimmed = [...meals];
  const photoIndexesOldestFirst = trimmed
    .map((meal, index) => ({ index, time: new Date(meal?.timestamp || meal?.date || 0).getTime() || 0 }))
    .filter(({ index }) => Boolean(trimmed[index]?.imageData))
    .sort((a, b) => a.time - b.time)
    .map(({ index }) => index);

  for (let removedPhotos = 1; removedPhotos <= photoIndexesOldestFirst.length; removedPhotos += 1) {
    const index = photoIndexesOldestFirst[removedPhotos - 1];
    trimmed[index] = slimMeal(trimmed[index]);
    try {
      localStorage.setItem(MEALS_KEY, JSON.stringify(trimmed));
      return { ok: true, meals: trimmed, removedPhotos };
    } catch {}
  }

  return { ok: false, meals: trimmed, removedPhotos: photoIndexesOldestFirst.length };
};
const mergeMealLists = (...lists) => {
  // Prefer the first copy of each meal, so primary storage keeps its images.
  const byId = new Map();
  const deleted = deletedMealKeys();
  lists.flatMap(mealListFrom).forEach(meal => {
    const key = mealKey(meal);
    if (meal && !deleted.has(key) && !byId.has(key)) byId.set(key, meal);
  });
  return [...byId.values()].sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
};
const mealSignature = meal => [
  meal?.timestamp || '',
  String(meal?.mealName || '').trim().toLowerCase(),
  Math.round(Number(meal?.calories) || 0),
].join('|');
const loadMealBackup = () => {
  const backup = mealListFrom(parseStoredJson(MEALS_BACKUP_KEY, { meals: [] }));
  const snapshots = parseStoredJson(MEALS_SNAP_KEY, []);
  return mergeMealLists(backup, ...snapshots.map(s => mealListFrom(s)));
};
const saveMealBackup = (meals, { resetSnapshots = false } = {}) => {
  // A latest backup plus a few snapshots gives us recovery points after bad writes.
  const slim = meals.map(slimMeal);
  const now = new Date().toISOString();
  try {
    localStorage.setItem(MEALS_BACKUP_KEY, JSON.stringify({ updatedAt: now, meals: slim }));
    const previous = resetSnapshots ? [] : parseStoredJson(MEALS_SNAP_KEY, []);
    const snapshots = [{ updatedAt: now, meals: slim }, ...previous].slice(0, 5);
    localStorage.setItem(MEALS_SNAP_KEY, JSON.stringify(snapshots));
  } catch {}
};
const loadMeals    = () => {
  // Merge the main store with image-free backups so history survives if primary
  // storage is corrupt, missing, or was overwritten with fewer meals.
  const primary = mealListFrom(parseStoredJson(MEALS_KEY, []));
  return mergeMealLists(primary, loadMealBackup());
};
const saveMeals    = (m, options = {}) => {
  // Return a result instead of swallowing write failures. Mobile localStorage can
  // fill quickly because meals may include image previews.
  const resetSnapshots = Boolean(options.resetSnapshots);
  if (resetSnapshots) resetMealRecovery();
  saveMealBackup(m, { resetSnapshots });
  try {
    localStorage.setItem(MEALS_KEY, JSON.stringify(m));
    saveMealBackup(m, { resetSnapshots });
    return { ok: true, meals: m, slimmed: false };
  } catch (error) {
    const trimmed = stripOldestMealPhotosUntilSaved(m);
    if (trimmed.ok) {
      saveMealBackup(trimmed.meals, { resetSnapshots });
      return { ok: true, meals: trimmed.meals, slimmed: true, removedPhotos: trimmed.removedPhotos, error };
    }
    return { ok: false, error };
  }
};
const loadSettings = () => { try { return JSON.parse(localStorage.getItem(SETT_KEY)  || '{}'); } catch { return {}; } };
const saveSettings = s  => { try { localStorage.setItem(SETT_KEY,  JSON.stringify(s)); } catch {} };
const WEIGHTS_KEY  = 'mt_weights_v1';
const loadWeights  = () => parseStoredJson(WEIGHTS_KEY, []);
const saveWeights  = (w) => { try { localStorage.setItem(WEIGHTS_KEY, JSON.stringify(w)); } catch {} };

/* ── Utils ──────────────────────────────────────────────── */
const dateStr = (date = new Date()) => {
  // Use local calendar dates, not UTC ISO dates. UTC can put late-night meals
  // under the wrong day for users outside GMT.
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
};
const todayStr    = () => dateStr();
const fmtTime     = ts => new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
const fmtDate     = ds => new Date(ds + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
const sum         = (arr, k) => arr.reduce((a, m) => a + (parseFloat(m[k]) || 0), 0);
const blobToB64   = blob => new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(blob); });
const fileToImage = file => new Promise((res, rej) => {
  // Decode with an object URL so large phone photos can be resized before storage.
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => { URL.revokeObjectURL(url); res(img); };
  img.onerror = error => { URL.revokeObjectURL(url); rej(error); };
  img.src = url;
});
const imageToMealPayload = async file => {
  // Store/send a compressed preview instead of the original camera file. This
  // keeps localStorage from silently hitting browser quota after a few meals.
  const img = await fileToImage(file);
  const maxSide = 1280;
  const scale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
  const canvas = document.createElement('canvas');
  canvas.width = Math.max(1, Math.round(img.naturalWidth * scale));
  canvas.height = Math.max(1, Math.round(img.naturalHeight * scale));
  canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
  const type = 'image/jpeg';
  const blob = await new Promise(resolve => canvas.toBlob(resolve, type, 0.72));
  if (!blob) throw new Error('Could not process image.');
  return { b64: await blobToB64(blob), type };
};
const asPositiveNumber = (value, fallback) => {
  const n = Number(value);
  return Number.isFinite(n) && n > 0 ? n : fallback;
};
const normalizeTargets = settings => ({
  calories: asPositiveNumber(settings?.targets?.calories, DEFAULT_TARGETS.calories),
  protein:  asPositiveNumber(settings?.targets?.protein,  DEFAULT_TARGETS.protein),
  carbs:    asPositiveNumber(settings?.targets?.carbs,    DEFAULT_TARGETS.carbs),
  fat:      asPositiveNumber(settings?.targets?.fat,      DEFAULT_TARGETS.fat),
});
const groupByDate = meals => {
  // History is grouped newest-first by the meal's assigned log date.
  const g = {};
  meals.forEach(m => { (g[m.date] = g[m.date] || []).push(m); });
  return Object.entries(g).sort(([a], [b]) => b.localeCompare(a));
};
const themeMeta = document.querySelector('meta[name="theme-color"]');
const applyTheme = theme => {
  // Persisted theme values are normalized so older/bad settings do not break UI.
  const mode = theme === 'light' || theme === 'dark' ? theme : 'auto';
  if (mode === 'auto') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.dataset.theme = mode;
  const prefersLight = window.matchMedia?.('(prefers-color-scheme: light)').matches;
  themeMeta?.setAttribute('content', mode === 'light' || (mode === 'auto' && prefersLight) ? '#f7f4ec' : '#0c1a10');
};
applyTheme(loadSettings().theme);

/* ── API ────────────────────────────────────────────────── */
// Both providers are asked for the same strict JSON shape so the UI can parse
// and display one shared analysis object regardless of provider.
const PROMPT = desc =>
`You are a clinical nutritionist. Analyze the food from the image, description, or both.${desc ? ` User context: "${desc}"` : ''}
Return ONLY a raw JSON object — no markdown, no explanation:
{"mealName":"specific dish name","calories":450,"protein":32.5,"carbs":28.0,"fat":18.5,"fiber":4.2,"ingredients":["visible component with estimated quantity","second visible component with estimated quantity"],"confidence":"high|medium|low","portionNote":"brief estimation note listing the detected visible components and portion assumptions"}
Calories in kcal. Macros in grams. Do not underestimate portions. If the user provided only an image and no description, spell out every detected meal component in ingredients, including sauces, sides, toppings, and drinks when visible.`;

const OPTIMIZE_PROMPT = (analysis, desc) =>
`You are a clinical nutritionist. Create a lower-calorie version of this meal while keeping it recognizable and satisfying.
Original user context: "${desc || 'No extra context provided.'}"
Original analysis: ${JSON.stringify(analysis)}
Return ONLY a raw JSON object — no markdown, no explanation:
{"mealName":"optimized dish name","calories":350,"protein":30.0,"carbs":24.0,"fat":12.0,"fiber":5.0,"ingredients":["optimized item with estimated quantity"],"confidence":"high|medium|low","portionNote":"brief note explaining the calorie-focused changes","suggestions":[{"text":"replace 2 tbsp mayonnaise with 2 tbsp Greek yogurt","caloriesDelta":-120,"proteinDelta":5.0,"carbsDelta":1.0,"fatDelta":-12.0,"fiberDelta":0.0},{"text":"use 120g grilled chicken breast instead of 120g fried chicken thigh","caloriesDelta":-80,"proteinDelta":6.0,"carbsDelta":0.0,"fatDelta":-9.0,"fiberDelta":0.0}],"calorieSavings":100}
Calories in kcal. Macros in grams. Keep protein as high as reasonably possible. Each suggestion must be concrete: name the original item, the replacement or reduction, and the specific quantity. Each suggestion must include estimated calorie and macro deltas versus the original item. Do not suggest unsafe restriction.`;

async function callAnthropic(img, desc, key) {
  // Anthropic manual mode uses the user's own key directly from the browser.
  const content = [
    ...(img ? [{ type: 'image', source: { type: 'base64', media_type: img.type, data: img.b64 } }] : []),
    { type: 'text', text: PROMPT(desc) },
  ];
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514', max_tokens: 1000,
      messages: [{ role: 'user', content }],
    }),
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error?.message || `HTTP ${res.status}`);
  return (d.content || []).map(b => b.text || '').join('');
}

async function callAnthropicOptimization(analysis, desc, key) {
  // Manual Anthropic optimization is text-only because it refines the parsed meal.
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514', max_tokens: 1000,
      messages: [{ role: 'user', content: [{ type: 'text', text: OPTIMIZE_PROMPT(analysis, desc) }] }],
    }),
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error?.message || `HTTP ${res.status}`);
  return (d.content || []).map(b => b.text || '').join('');
}

async function callOpenAI(img, desc, key) {
  if (key) {
    // Manual OpenAI mode mirrors the old browser-direct flow using the user's key.
    const content = [
      ...(img ? [{ type: 'image_url', image_url: { url: `data:${img.type};base64,${img.b64}` } }] : []),
      { type: 'text', text: PROMPT(desc) },
    ];
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'gpt-4o', max_tokens: 1000,
        messages: [{ role: 'user', content }],
      }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `HTTP ${res.status}`);
    return d.choices?.[0]?.message?.content || '';
  }

  // Server mode routes through Netlify so the app owner's OpenAI key stays private.
  const res = await fetch('/.netlify/functions/analyze-meal', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Meal-Tracker-Token': window.APP_CONFIG?.serverToken || '' },
    body: JSON.stringify({ img, desc }),
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error || `HTTP ${res.status}`);
  return d.text || '';
}

async function callOpenAIOptimization(analysis, desc, key) {
  if (key) {
    // Manual OpenAI optimization uses the user's own key and never touches server mode.
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'gpt-4o', max_tokens: 1000,
        messages: [{ role: 'user', content: [{ type: 'text', text: OPTIMIZE_PROMPT(analysis, desc) }] }],
      }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `HTTP ${res.status}`);
    return d.choices?.[0]?.message?.content || '';
  }

  // Server optimization keeps the owner OpenAI key inside the Netlify function.
  const res = await fetch('/.netlify/functions/analyze-meal', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Meal-Tracker-Token': window.APP_CONFIG?.serverToken || '' },
    body: JSON.stringify({ mode: 'optimize', analysis, desc }),
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error || `HTTP ${res.status}`);
  return d.text || '';
}

/* ── CalorieRing ────────────────────────────────────────── */
function Ring({ consumed, target }) {
  // The ring caps visual progress at 100% while still showing over-target totals.
  const r = 56, sw = 9, circ = 2 * Math.PI * r;
  const pct = Math.min(consumed / target, 1), over = consumed > target;
  return html`
    <div style="position:relative;width:144px;height:144px;flex-shrink:0">
      <svg width="144" height="144" style="transform:rotate(-90deg)">
        <circle cx="72" cy="72" r=${r} fill="none" stroke="var(--card)" stroke-width=${sw}/>
        <circle cx="72" cy="72" r=${r} fill="none"
          stroke=${over ? 'var(--danger)' : 'var(--accent)'} stroke-width=${sw}
          stroke-dasharray="${pct * circ} ${circ}" stroke-linecap="round"
          style="transition:stroke-dasharray .7s ease"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px">
        <span style="font-family:'Playfair Display',serif;font-size:28px;color:${over ? 'var(--danger)' : 'var(--text)'};line-height:1">
          ${Math.round(consumed)}
        </span>
        <span style="font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase">
          / ${target} kcal
        </span>
      </div>
    </div>`;
}

/* ── MacroBar ───────────────────────────────────────────── */
function MBar({ label, value, max, color }) {
  // Macro bars share the same capped-progress behavior as calories.
  const pct = Math.min((value / max) * 100, 100);
  return html`
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">${label}</span>
        <span style="font-size:11px;color:var(--text);font-family:'DM Mono',monospace">${value.toFixed(0)}g</span>
      </div>
      <div style="height:3px;background:var(--card);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${color};border-radius:2px;transition:width .7s ease"/>
      </div>
    </div>`;
}

/* ── WeightChart ────────────────────────────────────────── */
function WeightChart({ entries, goalWeight, unit }) {
  const W = 300, H = 90;
  const PAD = { top: 8, right: 14, bottom: 22, left: 34 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;

  if (entries.length < 2) {
    return html`
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
        <text x=${W/2} y=${H/2 + 4} text-anchor="middle" font-size="11"
          fill="var(--muted)" font-family="DM Sans, sans-serif">
          Log at least 2 entries to see your trend
        </text>
      </svg>`;
  }

  const vals = entries.map(e => e.weight);
  const minW = Math.min(...vals), maxW = Math.max(...vals);
  const yPad = (maxW - minW) * 0.15 || 1;
  const yMin = minW - yPad, yMax = maxW + yPad;

  const toX = i => PAD.left + (i / (entries.length - 1)) * chartW;
  const toY = v => PAD.top + chartH - ((v - yMin) / (yMax - yMin)) * chartH;
  const points = entries.map((e, i) => `${toX(i).toFixed(1)},${toY(e.weight).toFixed(1)}`).join(' ');
  const goalY = goalWeight != null ? toY(goalWeight) : null;
  const goalInRange = goalY != null && goalY >= PAD.top - 2 && goalY <= PAD.top + chartH + 2;

  return html`
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
      <text x=${PAD.left - 4} y=${PAD.top + 4} text-anchor="end" font-size="8"
        fill="var(--muted)" font-family="DM Mono, monospace">${maxW.toFixed(1)}</text>
      <text x=${PAD.left - 4} y=${PAD.top + chartH} text-anchor="end" font-size="8"
        fill="var(--muted)" font-family="DM Mono, monospace">${minW.toFixed(1)}</text>
      <text x=${toX(0).toFixed(1)} y=${H - 4} text-anchor="middle" font-size="8"
        fill="var(--muted)" font-family="DM Mono, monospace">${entries[0].date.slice(5)}</text>
      <text x=${toX(entries.length - 1).toFixed(1)} y=${H - 4} text-anchor="end" font-size="8"
        fill="var(--muted)" font-family="DM Mono, monospace">${entries[entries.length - 1].date.slice(5)}</text>
      ${goalInRange ? html`
        <line x1=${PAD.left} y1=${goalY.toFixed(1)} x2=${PAD.left + chartW} y2=${goalY.toFixed(1)}
          stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
        <text x=${PAD.left + chartW + 2} y=${(goalY + 3).toFixed(1)} font-size="7"
          fill="var(--accent)" font-family="DM Mono, monospace">goal</text>
      ` : null}
      <polyline points=${points} fill="none" stroke="var(--mint)"
        stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>
      ${entries.map((e, i) => {
        const isLast = i === entries.length - 1;
        return html`<circle key=${i} cx=${toX(i).toFixed(1)} cy=${toY(e.weight).toFixed(1)}
          r=${isLast ? 4.5 : 2.5}
          fill=${isLast ? 'var(--mint)' : 'var(--card)'}
          stroke="var(--mint)" stroke-width="1.5"/>`;
      })}
    </svg>`;
}

/* ── Add Meal View ──────────────────────────────────────── */
function AddView({ settings, meal, repeatMeal, meals = [], onSave, onCancel }) {
  // AddView also powers editing and repeat logging; only `meal` updates an existing record.
  const { provider = 'server', anthropicKey = '', oaiKey = '' } = settings;
  const trimmedAnthropicKey = anthropicKey.trim();
  const trimmedOaiKey = oaiKey.trim();
  const activeProvider =
    provider === 'anthropic' && trimmedAnthropicKey ? 'anthropic' :
    provider === 'openai' && trimmedOaiKey ? 'openai' :
    'server';
  const isEditing = Boolean(meal);
  const seedMeal = meal || repeatMeal;
  const initialAnalysis = seedMeal ? {
    mealName: seedMeal.mealName,
    calories: seedMeal.calories,
    protein: seedMeal.protein,
    carbs: seedMeal.carbs,
    fat: seedMeal.fat,
    fiber: seedMeal.fiber || 0,
    ingredients: seedMeal.ingredients || [],
    portionNote: seedMeal.portionNote || '',
    confidence: seedMeal.confidence || 'medium',
  } : null;
  const [img,      setImg]      = useState(seedMeal?.imageData ? {
    url: `data:${seedMeal.imageType};base64,${seedMeal.imageData}`,
    b64: seedMeal.imageData,
    type: seedMeal.imageType,
  } : null);
  const [desc,     setDesc]     = useState(seedMeal?.description || '');
  const [mealDate, setMealDate] = useState(isEditing ? meal?.date : todayStr());
  const [status,   setStatus]   = useState(seedMeal ? 'review' : 'idle');
  const [analysis, setAnalysis] = useState(initialAnalysis);
  const [editCal,  setEditCal]  = useState(seedMeal ? String(Math.round(seedMeal.calories)) : '');
  const [editProtein, setEditProtein] = useState(seedMeal ? String(Number(seedMeal.protein || 0).toFixed(1)) : '');
  const [editCarbs,   setEditCarbs]   = useState(seedMeal ? String(Number(seedMeal.carbs || 0).toFixed(1)) : '');
  const [editFat,     setEditFat]     = useState(seedMeal ? String(Number(seedMeal.fat || 0).toFixed(1)) : '');
  const [editFiber,   setEditFiber]   = useState(seedMeal ? String(Number(seedMeal.fiber || 0).toFixed(1)) : '');
  const [userEditedNutrition, setUserEditedNutrition] = useState(false);
  const [analysisProvider, setAnalysisProvider] = useState(seedMeal?.provider || activeProvider);
  const [optStatus, setOptStatus] = useState('idle');
  const [optimization, setOptimization] = useState(null);
  const [err,      setErr]      = useState('');
  const fileRef = useRef();

  useEffect(() => {
    // Transient Add Meal errors should clear themselves, while still being dismissible.
    if (!err) return undefined;
    const t = setTimeout(() => setErr(''), 8000);
    return () => clearTimeout(t);
  }, [err]);

  const previousMeals = (() => {
    // Show recent unique meals so common repeats can be logged without another AI call.
    const bySignature = new Map();
    meals.forEach(item => {
      const key = [
        String(item.mealName || '').trim().toLowerCase(),
        Math.round(Number(item.calories) || 0),
        Math.round(Number(item.protein) || 0),
        Math.round(Number(item.carbs) || 0),
        Math.round(Number(item.fat) || 0),
      ].join('|');
      if (item.mealName && !bySignature.has(key)) bySignature.set(key, item);
    });
    return [...bySignature.values()].slice(0, 8);
  })();

  const pick = async e => {
    // Choosing a new photo invalidates the current analysis until re-run.
    const f = e.target.files?.[0]; if (!f) return;
    setAnalysis(null); setOptimization(null); setOptStatus('idle'); setStatus('idle'); setErr(''); setUserEditedNutrition(false); setAnalysisProvider(activeProvider);
    try {
      const processed = await imageToMealPayload(f);
      setImg({ url: `data:${processed.type};base64,${processed.b64}`, ...processed });
      trackEvent('meal_photo_added', { image_type: processed.type, source: isEditing ? 'edit' : 'add' });
    } catch (error) {
      setErr(`Image failed: ${error.message || 'Could not process image.'}`);
      trackEvent('meal_photo_failed', { source: isEditing ? 'edit' : 'add' });
    }
  };

  const usePreviousMeal = item => {
    // Reusing a meal copies its nutrition estimate locally; it does not call AI.
    setDesc(item.description || '');
    setMealDate(todayStr());
    setImg(item.imageData ? {
      url: `data:${item.imageType};base64,${item.imageData}`,
      b64: item.imageData,
      type: item.imageType,
    } : null);
    setAnalysis({
      mealName: item.mealName,
      calories: item.calories,
      protein: item.protein,
      carbs: item.carbs,
      fat: item.fat,
      fiber: item.fiber || 0,
      ingredients: item.ingredients || [],
      portionNote: item.portionNote || '',
      confidence: item.confidence || 'medium',
    });
    setEditableNutrition(item);
    setAnalysisProvider(item.provider || activeProvider);
    setOptimization(null);
    setOptStatus('idle');
    setErr('');
    setStatus('review');
    trackEvent('previous_meal_selected');
  };

  const parseAiJson = raw => JSON.parse(raw.replace(/```json|```/gi, '').trim());
  const formatDelta = (value, unit = 'g') => {
    // Deltas are shown with signs so reductions and increases are easy to scan.
    const n = Number(value);
    if (!Number.isFinite(n)) return null;
    const rounded = unit === 'kcal' ? Math.round(n) : n.toFixed(1);
    return `${n > 0 ? '+' : ''}${rounded}${unit}`;
  };
  const macroImpact = (next, base, key, unit = 'g') => formatDelta(Number(next?.[key] || 0) - Number(base?.[key] || 0), unit);
  const nutritionNumber = (value, fallback = 0) => {
    if (String(value ?? '').trim() === '') return fallback;
    const n = Number(value);
    return Number.isFinite(n) && n >= 0 ? n : fallback;
  };
  const setEditableNutrition = next => {
    setEditCal(String(Math.round(next?.calories || 0)));
    setEditProtein(String(Number(next?.protein || 0).toFixed(1)));
    setEditCarbs(String(Number(next?.carbs || 0).toFixed(1)));
    setEditFat(String(Number(next?.fat || 0).toFixed(1)));
    setEditFiber(String(Number(next?.fiber || 0).toFixed(1)));
    setUserEditedNutrition(false);
  };
  const markNutritionEdited = field => {
    if (!userEditedNutrition) trackEvent('meal_nutrition_edited', { field, source: isEditing ? 'edit' : 'add' });
    setUserEditedNutrition(true);
  };
  const hasNutritionEdits = sourceAnalysis => {
    const same = (a, b) => Math.abs(nutritionNumber(a, 0) - nutritionNumber(b, 0)) < 0.05;
    return !same(editCal, sourceAnalysis.calories)
      || !same(editProtein, sourceAnalysis.protein)
      || !same(editCarbs, sourceAnalysis.carbs)
      || !same(editFat, sourceAnalysis.fat)
      || !same(editFiber, sourceAnalysis.fiber || 0);
  };
  const changedNutritionFields = sourceAnalysis => {
    const same = (a, b) => Math.abs(nutritionNumber(a, 0) - nutritionNumber(b, 0)) < 0.05;
    return [
      ['calories', editCal, sourceAnalysis.calories],
      ['protein', editProtein, sourceAnalysis.protein],
      ['carbs', editCarbs, sourceAnalysis.carbs],
      ['fat', editFat, sourceAnalysis.fat],
      ['fiber', editFiber, sourceAnalysis.fiber || 0],
    ].filter(([, next, previous]) => !same(next, previous)).map(([field]) => field);
  };
  const NutritionInput = ({ label, value, onInput, color, field }) => html`
    <label style="background:var(--surface);border-radius:10px;padding:8px 4px;text-align:center;display:block">
      <input type="number" min="0" step="0.1" value=${value} onInput=${e => { markNutritionEdited(field); onInput(e.target.value); }}
        onKeyDown=${e => { if (e.key === 'Enter') e.currentTarget.blur(); }}
        style="width:100%;background:transparent;border:none;border-bottom:1px solid ${color};color:${color};font-size:16px;font-weight:700;font-family:'DM Mono',monospace;text-align:center;outline:none;padding:2px 0"/>
      <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:5px">${label}</div>
    </label>`;
  const nutritionIsEdited = analysis ? hasNutritionEdits(analysis) : false;
  const displayProvider = status === 'review' ? (nutritionIsEdited ? 'user' : analysisProvider) : activeProvider;
  const pc = providerColor(displayProvider);
  const aiColor = providerColor(activeProvider);
  const suggestionText = suggestion => typeof suggestion === 'string' ? suggestion : suggestion?.text || suggestion?.suggestion || '';
  const suggestionImpact = suggestion => {
    // New AI responses provide per-suggestion macro deltas; old string suggestions still render.
    if (!suggestion || typeof suggestion === 'string') return [];
    return [
      ['Cal', suggestion.caloriesDelta, 'kcal'],
      ['P', suggestion.proteinDelta, 'g'],
      ['C', suggestion.carbsDelta, 'g'],
      ['F', suggestion.fatDelta, 'g'],
      ['Fi', suggestion.fiberDelta, 'g'],
    ].map(([label, value, unit]) => [label, formatDelta(value, unit)]).filter(([, value]) => value);
  };

  const analyze = async () => {
    // Date edits are intentionally independent; only this button calls AI again.
    const trimmedDesc = desc.trim();
    if (!img && !trimmedDesc) { setErr('Please add a photo, a description, or both.'); return; }
    const key = activeProvider === 'anthropic' ? trimmedAnthropicKey : activeProvider === 'openai' ? trimmedOaiKey : '';
    setStatus('analyzing'); setOptimization(null); setOptStatus('idle'); setErr('');
    trackEvent('meal_analysis_started', {
      provider: activeProvider,
      used_image: Boolean(img),
      used_description: Boolean(trimmedDesc),
      source: isEditing ? 'edit' : 'add',
    });
    try {
      const raw = activeProvider === 'anthropic'
        ? await callAnthropic(img, trimmedDesc, key)
        : await callOpenAI(img, trimmedDesc, key);
      const parsed = parseAiJson(raw);
      setAnalysis(parsed); setEditableNutrition(parsed); setAnalysisProvider(activeProvider); setStatus('review');
      trackEvent('meal_analysis_succeeded', {
        provider: activeProvider,
        used_image: Boolean(img),
        used_description: Boolean(trimmedDesc),
        source: isEditing ? 'edit' : 'add',
        calories_bucket: valueBucket(parsed.calories, 100),
      });
    } catch (e) {
      setErr(`Analysis failed: ${e.message}`);
      setStatus('error');
      trackEvent('meal_analysis_failed', {
        provider: activeProvider,
        used_image: Boolean(img),
        used_description: Boolean(trimmedDesc),
        source: isEditing ? 'edit' : 'add',
      });
    }
  };

  const optimizeCalories = async () => {
    // Optimization is a second, optional AI call that starts from the reviewed analysis.
    if (!analysis) return;
    const reviewedAnalysis = {
      ...analysis,
      calories: nutritionNumber(editCal, analysis.calories),
      protein: nutritionNumber(editProtein, analysis.protein),
      carbs: nutritionNumber(editCarbs, analysis.carbs),
      fat: nutritionNumber(editFat, analysis.fat),
      fiber: nutritionNumber(editFiber, analysis.fiber || 0),
    };
    const key = activeProvider === 'anthropic' ? trimmedAnthropicKey : activeProvider === 'openai' ? trimmedOaiKey : '';
    setOptStatus('optimizing'); setOptimization(null); setErr('');
    trackEvent('meal_optimization_started', {
      provider: activeProvider,
      calories_bucket: valueBucket(reviewedAnalysis.calories, 100),
    });
    try {
      const raw = activeProvider === 'anthropic'
        ? await callAnthropicOptimization(reviewedAnalysis, desc.trim(), key)
        : await callOpenAIOptimization(reviewedAnalysis, desc.trim(), key);
      const parsed = parseAiJson(raw);
      setOptimization(parsed);
      setOptStatus('review');
      trackEvent('meal_optimization_succeeded', {
        provider: activeProvider,
        original_calories_bucket: valueBucket(reviewedAnalysis.calories, 100),
        optimized_calories_bucket: valueBucket(parsed.calories, 100),
      });
    } catch (e) {
      setErr(`Optimization failed: ${e.message}`);
      setOptStatus('idle');
      trackEvent('meal_optimization_failed', { provider: activeProvider });
    }
  };

  const log = (sourceAnalysis = analysis, source = repeatMeal ? 'log_again' : 'analysis') => {
    // Saving reuses the current analysis. If only the date changed, no AI call runs.
    if (!sourceAnalysis) return;
    document.activeElement?.blur?.();
    const optimized = source === 'optimized';
    const changedFields = optimized ? [] : changedNutritionFields(sourceAnalysis);
    const editedByUser = changedFields.length > 0;
    const providerSource = editedByUser ? 'user' : optimized ? activeProvider : analysisProvider;
    const reviewedAnalysis = optimized ? sourceAnalysis : {
      ...sourceAnalysis,
      calories: nutritionNumber(editCal, sourceAnalysis.calories),
      protein: nutritionNumber(editProtein, sourceAnalysis.protein),
      carbs: nutritionNumber(editCarbs, sourceAnalysis.carbs),
      fat: nutritionNumber(editFat, sourceAnalysis.fat),
      fiber: nutritionNumber(editFiber, sourceAnalysis.fiber || 0),
    };
    onSave({
      id: meal?.id || Date.now(),
      date: mealDate || meal?.date || todayStr(),
      timestamp: meal?.timestamp || new Date().toISOString(),
      updatedAt: isEditing ? new Date().toISOString() : undefined,
      description: desc.trim(), provider: providerSource,
      imageData: img?.b64 || null, imageType: img?.type || null,
      mealName:    reviewedAnalysis.mealName,
      calories:    reviewedAnalysis.calories,
      protein:     reviewedAnalysis.protein,  carbs:  reviewedAnalysis.carbs,
      fat:         reviewedAnalysis.fat,      fiber:  reviewedAnalysis.fiber || 0,
      ingredients: reviewedAnalysis.ingredients  || [],
      portionNote: reviewedAnalysis.portionNote  || '',
      confidence:  reviewedAnalysis.confidence   || 'medium',
    }, {
      source: editedByUser ? 'user' : source,
      optimized,
      nutritionEdited: editedByUser,
      nutritionFieldCount: changedFields.length,
      nutritionFields: changedFields.join(','),
    });
  };

  return html`
    <div style="display:flex;flex-direction:column;height:100%;min-height:0">
      <!-- Header -->
      <div style="padding:calc(var(--sat) + 14px) 16px 12px;flex-shrink:0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:12px">
          <button onClick=${onCancel}
            style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center">←</button>
          <span style="font-family:'Playfair Display',serif;font-size:22px;color:var(--text);flex:1">${isEditing ? 'Edit Meal' : 'Add Meal'}</span>
          <span style="font-size:10px;color:${pc};background:${providerBg(displayProvider)};padding:4px 10px;border-radius:20px;border:1px solid ${pc};letter-spacing:.06em;text-transform:uppercase;font-weight:600">
            ${providerLabel(displayProvider)}
          </span>
        </div>
      </div>

      <!-- Scroll body -->
      <div class="scroll" style="flex:1;padding:14px 16px">
        <!-- Photo -->
        <div onClick=${() => !img && fileRef.current?.click()}
          style="border-radius:16px;overflow:hidden;margin-bottom:12px;background:var(--card);
                 border:${img ? '1px solid var(--border)' : '2px dashed var(--muted)'};
                 cursor:${img ? 'default' : 'pointer'};
                 ${img ? '' : 'min-height:160px;display:flex;align-items:center;justify-content:center'}">
          ${img ? html`
            <div style="position:relative">
              <img class="ph-no-capture" src=${img.url} style="width:100%;max-height:240px;object-fit:cover;display:block"/>
              <button onClick=${e => { e.stopPropagation(); setImg(null); setAnalysis(null); setOptimization(null); setOptStatus('idle'); setStatus('idle'); setUserEditedNutrition(false); setAnalysisProvider(activeProvider); fileRef.current.value = ''; }}
                style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,.65);border:none;color:var(--text);border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">×</button>
            </div>` : html`
            <div style="text-align:center;color:var(--muted);padding:20px">
              <div style="font-size:42px;margin-bottom:8px">📷</div>
              <div style="font-size:15px;font-weight:500">Add a photo</div>
              <div style="font-size:12px;margin-top:3px">optional if you describe the meal</div>
            </div>`}
        </div>
        <input ref=${fileRef} type="file" accept="image/*" onChange=${pick} style="display:none"/>

        <!-- Description -->
        <textarea class="ph-no-capture" value=${desc} onInput=${e => setDesc(e.target.value)}
          placeholder="Describe the meal, portions, ingredients, or restaurant…" rows="3"
          style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:14px;outline:none;resize:none;margin-bottom:12px;font-family:'DM Sans',sans-serif;box-sizing:border-box"></textarea>

        <!-- Previous meals -->
        ${!isEditing && previousMeals.length > 0 && status !== 'review' ? html`
          <div style="margin-bottom:12px">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Previous Meals</div>
            <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">
              ${previousMeals.map(item => html`
                <button key=${mealKey(item)} onClick=${() => usePreviousMeal(item)}
                  style="flex:0 0 180px;max-width:180px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:left;cursor:pointer;color:var(--text)">
                  <div style="font-size:13px;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px">${item.mealName}</div>
                  <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">${Math.round(item.calories)} kcal</div>
                  <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px">${Number(item.protein || 0).toFixed(0)}P · ${Number(item.carbs || 0).toFixed(0)}C · ${Number(item.fat || 0).toFixed(0)}F</div>
                </button>`)}
            </div>
          </div>` : null}

        <!-- Error -->
        ${err ? html`
          <div style="background:rgba(212,106,90,.12);border:1px solid var(--danger);border-radius:10px;padding:12px;color:var(--danger);font-size:13px;margin-bottom:12px;line-height:1.4;display:flex;gap:10px;align-items:flex-start">
            <div style="flex:1;min-width:0">${err}</div>
            <button onClick=${() => setErr('')}
              style="background:none;border:none;color:var(--danger);font-size:18px;line-height:1;cursor:pointer;min-width:28px;min-height:28px;display:flex;align-items:center;justify-content:center;margin-top:-4px">×</button>
          </div>` : null}

        <!-- Analysis result -->
        ${status === 'review' && analysis ? html`
          <div style="background:var(--card);border:1px solid rgba(${activeProvider === 'anthropic' ? '201,168,76' : '116,170,156'},.2);border-radius:16px;padding:14px;margin-bottom:12px">
            <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:12px">${analysis.mealName}</div>
            <div style="display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:10px;padding:10px 12px;margin-bottom:12px">
              <span style="font-size:12px;color:var(--muted);flex:1">Calories</span>
              <input type="number" min="0" step="1" value=${editCal} onInput=${e => { markNutritionEdited('calories'); setEditCal(e.target.value); }}
                onKeyDown=${e => { if (e.key === 'Enter') e.currentTarget.blur(); }}
                style="width:72px;background:transparent;border:none;border-bottom:1px solid ${pc};color:${pc};font-size:22px;font-family:'DM Mono',monospace;font-weight:700;text-align:center;outline:none;padding:2px 0"/>
              <span style="font-size:12px;color:var(--muted)">kcal</span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
              ${NutritionInput({ label: 'Protein', value: editProtein, onInput: setEditProtein, color: 'var(--mint)', field: 'protein' })}
              ${NutritionInput({ label: 'Carbs', value: editCarbs, onInput: setEditCarbs, color: 'var(--sky)', field: 'carbs' })}
              ${NutritionInput({ label: 'Fat', value: editFat, onInput: setEditFat, color: 'var(--peach)', field: 'fat' })}
              ${NutritionInput({ label: 'Fiber', value: editFiber, onInput: setEditFiber, color: 'var(--plum)', field: 'fiber' })}
            </div>
            ${nutritionIsEdited ? html`
              <div style="font-size:10px;color:var(--plum);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
                Source will be saved as User
              </div>` : null}
            ${analysis.portionNote ? html`
              <div style="font-size:11px;color:var(--muted);font-style:italic;padding:8px 10px;background:rgba(${activeProvider === 'anthropic' ? '201,168,76' : '116,170,156'},.06);border-radius:8px;border-left:2px solid ${pc}">
                ${analysis.portionNote}
              </div>` : null}
          </div>` : null}

        <!-- Calorie optimization -->
        ${!isEditing && status === 'review' && analysis ? html`
          <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:${optimization ? '12px' : '0'}">
              <div style="flex:1;min-width:0">
                <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Calorie Optimization</div>
                <div style="font-size:13px;color:var(--text);line-height:1.35">Ask AI for a lower-calorie version before logging.</div>
              </div>
              <button onClick=${optimizeCalories} disabled=${optStatus === 'optimizing'}
                style="flex:0 0 auto;background:${optStatus === 'optimizing' ? 'var(--muted)' : 'var(--surface)'};border:1px solid ${aiColor};color:${optStatus === 'optimizing' ? 'var(--surface)' : aiColor};border-radius:10px;padding:10px 12px;font-size:12px;font-weight:700;cursor:${optStatus === 'optimizing' ? 'not-allowed' : 'pointer'}">
                ${optStatus === 'optimizing' ? 'Optimizing…' : optimization ? 'Try Again' : 'Optimize'}
              </button>
            </div>
            ${optimization ? html`
              <div style="background:var(--surface);border:1px solid rgba(${activeProvider === 'anthropic' ? '201,168,76' : '116,170,156'},.18);border-radius:12px;padding:12px">
                <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px">
                  <div style="flex:1;min-width:0">
                    <div style="font-family:'Playfair Display',serif;font-size:17px;color:var(--text);line-height:1.2">${optimization.mealName || 'Optimized Meal'}</div>
                    ${optimization.calorieSavings ? html`
                      <div style="font-size:11px;color:var(--mint);font-family:'DM Mono',monospace;margin-top:4px">-${Math.round(optimization.calorieSavings)} kcal estimated</div>` : null}
                  </div>
                  <div style="font-size:20px;color:${aiColor};font-family:'DM Mono',monospace;font-weight:700;white-space:nowrap">${Math.round(optimization.calories || 0)} kcal</div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">
                  ${[['P', optimization.protein], ['C', optimization.carbs], ['F', optimization.fat], ['Fi', optimization.fiber || 0]].map(([l, v]) => html`
                    <div style="background:var(--card);border-radius:8px;padding:7px 4px;text-align:center">
                      <div style="font-size:13px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace">${Number(v || 0).toFixed(0)}</div>
                      <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">${l}</div>
                    </div>`)}
                </div>
                <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px">
                  ${[
                    ['Cal', macroImpact(optimization, analysis, 'calories', 'kcal')],
                    ['P', macroImpact(optimization, analysis, 'protein')],
                    ['C', macroImpact(optimization, analysis, 'carbs')],
                    ['F', macroImpact(optimization, analysis, 'fat')],
                    ['Fi', macroImpact(optimization, analysis, 'fiber')],
                  ].map(([label, delta]) => html`
                    <div style="background:var(--card);border-radius:8px;padding:7px 3px;text-align:center">
                      <div style="font-size:11px;font-weight:700;color:${String(delta || '').startsWith('-') ? 'var(--mint)' : 'var(--muted)'};font-family:'DM Mono',monospace;white-space:nowrap">${delta}</div>
                      <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">${label} Δ</div>
                    </div>`)}
                </div>
                ${(optimization.suggestions || []).length ? html`
                  <div style="display:grid;gap:6px;margin-bottom:10px">
                    ${(optimization.suggestions || []).slice(0, 4).map(suggestion => html`
                      <div style="background:var(--card);border-radius:8px;padding:8px">
                        <div style="font-size:12px;color:var(--muted);line-height:1.35">${suggestionText(suggestion)}</div>
                        ${suggestionImpact(suggestion).length ? html`
                          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:7px">
                            ${suggestionImpact(suggestion).map(([label, delta]) => html`
                              <span style="font-size:9px;color:${String(delta).startsWith('-') ? 'var(--mint)' : 'var(--muted)'};font-family:'DM Mono',monospace;background:var(--surface);border-radius:6px;padding:3px 5px;white-space:nowrap">${label} ${delta}</span>`)}
                          </div>` : null}
                      </div>`)}
                  </div>` : null}
                ${optimization.portionNote ? html`
                  <div style="font-size:11px;color:var(--muted);font-style:italic;line-height:1.35;margin-bottom:10px">${optimization.portionNote}</div>` : null}
                <button onClick=${() => log(optimization, 'optimized')}
                  style="width:100%;padding:13px;background:${aiColor};border:none;border-radius:10px;font-size:14px;font-weight:700;color:#0c1a10;cursor:pointer;min-height:46px">
                  Accept & Log ✓
                </button>
              </div>` : null}
          </div>` : null}

        <!-- Meal date editor -->
        ${status === 'review' && analysis ? html`
          <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px">
            <label style="display:block;min-width:0;max-width:100%;overflow:hidden">
              <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Meal Date</div>
              <input type="date" value=${mealDate} onInput=${e => {
                setMealDate(e.target.value);
                trackEvent('meal_date_changed', { source: isEditing ? 'edit' : 'add', date_type: e.target.value === todayStr() ? 'today' : 'other_day' });
              }}
                style="display:block;width:100%;max-width:100%;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:13px 10px;outline:none;font-family:'DM Mono',monospace;box-sizing:border-box;appearance:none;-webkit-appearance:none"/>
            </label>
          </div>` : null}
      </div>

      <!-- CTA -->
      <div style="padding:10px 16px calc(var(--sab) + 10px);border-top:1px solid var(--border);flex-shrink:0">
        ${status !== 'review' ? html`
          <button onClick=${analyze}
            style="width:100%;padding:16px;background:${!img && !desc.trim() ? 'var(--muted)' : pc};border:none;border-radius:14px;font-size:15px;font-weight:700;color:${!img && !desc.trim() ? 'var(--surface)' : '#0c1a10'};cursor:${!img && !desc.trim() || status === 'analyzing' ? 'not-allowed' : 'pointer'};min-height:54px;opacity:${status === 'analyzing' ? .7 : 1}">
            ${status === 'analyzing' ? 'Analyzing…' : 'Analyze Meal'}
          </button>` : html`
          <div style="display:flex;gap:10px">
            <button onClick=${analyze}
              style="flex:1;padding:16px;background:none;border:1px solid var(--muted);border-radius:14px;font-size:14px;color:var(--muted);cursor:pointer;min-height:54px">
              Re-analyze
            </button>
            <button onClick=${() => log()}
              style="flex:2;padding:16px;background:${pc};border:none;border-radius:14px;font-size:15px;font-weight:700;color:#0c1a10;cursor:pointer;min-height:54px">
              ${isEditing ? 'Save Meal ✓' : 'Log Meal ✓'}
            </button>
          </div>`}
      </div>
    </div>`;
}

/* ── Today View ─────────────────────────────────────────── */

            ${rem >= 0 ? `${Math.round(rem)} kcal remaining` : `${Math.abs(Math.round(rem))} kcal over target`}
          </div>
          <div style="display:flex;gap:14px;margin-bottom:24px">

          </div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">

              ${today.length === 0 ? 'No meals logged yet' : `${today.length} Meal${today.length > 1 ? 's' : ''} today`}

            ${today.length > 0 ? html`
              <span style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">
                ${protein.toFixed(0)}P·${carbs.toFixed(0)}C·${fat.toFixed(0)}F
              </span>` : null}

          ${sorted.map(m => html`<${MealCard} key=${m.id} meal=${m} onDelete=${onDelete} onEdit=${onEdit}/>`)}
          ${today.length === 0 ? html`

              <div style="font-size:36px;margin-bottom:10px">🍽</div>
              <div style="font-size:14px">Tap <strong style="color:var(--accent)">+</strong> to log your first meal</div>
            </div>` : null}

      ${showFeedbackButton ? html`

          <button aria-label="Send feedback" onClick=${() => onFeedback('home_floating')}
